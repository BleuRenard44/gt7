name: Docker build check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gt7-dashboard-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t gt7-dashboard-frontend:ci ./frontend
