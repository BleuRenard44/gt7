apiVersion: apps/v1
kind: Deployment
metadata:
  name: gt7-dashboard-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gt7-dashboard-frontend
  template:
    metadata:
      labels:
        app: gt7-dashboard-frontend
    spec:
      containers:
        - name: frontend
          image: gt7-dashboard-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gt7-dashboard-frontend
spec:
  type: NodePort
  selector:
    app: gt7-dashboard-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
